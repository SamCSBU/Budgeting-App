<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgeting Website - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
  </head>
  <body>
    <h1 class = "title">Budgeting Site</h1>

    <form action = "analysis.html" id ="my-form">
      <div class = "questions">
        <div class = "question-block">
          <div class = "question">
        <label for = "annual-income">Annual Income</label>
        <input id = "annual-income" type="number" name = "annual-income" min = "0" max = "100000000">
            </div>
            <div class = "question">
        <label for = "rent">Monthly Rent/Mortage</label>
        <input id = "rent" type="number" name = "rent" min = "0" max = "100000000">
              </div>
              <div class = "question">
        <label for = "utilities">Monthly Utilities</label>
        <input id = "utilities" type="number" name = "utilities" min = "0" max = "100000000">
                </div>
        </div>
        <div class = "question-block">
          <div class = "question">
        <label for = "streaming">Monthly cost of Streaming</label>
        <input id = "streaming" type="number" name = "streaming" min = "0" max = "100000000">
            </div>
            <div class = "question">
        <label for = "groceries">Weekly cost of Groceries</label>
        <input id = "groceries" type="number" name = "groceries" min = "0" max = "100000000">
              </div>
              <div class = "question">
        <label for = "vacation-time">Months Before Next Vacation</label>
        <input id = "vacation-time" type="number" name = "vacation-time" min = "0" max = "100000000">
                </div>
        </div>
        <div class = "question-block">
          <div class = "question">
        <label for = "vacation-cost">Estimated Cost of Vacation</label>
        <input id = "vacation-cost" type="number" name = "vacation-cost" min = "0" max = "100000000">
            </div>
            <div class = "question">
        <label for = "big-purchase">Upcoming Big Purchases This Month</label>
        <input id = "big-purchase" type="number" name = "big-purchase" min = "0" max ="100000000">
              </div>
              <div class = "question">
        <label for = "personal">Weekly Personal Spending</label>
        <input id = "personal" type = "number" name = "personal" min = "0" max = "100000000">
                </div>
        </div>
       </div>
          
        
        <!----
        <p>What type of area do you live in?</p>
        <input type = "radio" id = "class-suburban" name = "class" value = "suburban">
        <label for = "class-suburban">Suburban</label>

        <input type = "radio" id = "class-urban" name = "class" value = "urban">
        <label for = "class-urban">Urban</label>

        <input type = "radio" id = "class-rural" name = "class" value = "rural">
        <label for = "class-rural">Rural</label>
      -->

        <button id = "submit" type="submit" name = "submit">Submit</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src = "index.js" type = "module" defer></script>
  </body>
</html>
